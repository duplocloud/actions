name: User Allowed
description: Checks if the user is allowed to deploy to the environment
inputs:
  current_environment:
    description: The environment to deploy to
    required: true
  protected_environment:
    description: The environment which the team is allowed to deploy to
    required: true
  team: 
    description: The team to check membership of
    required: true
  github-token:
    description: The github token
    required: true
runs:
  using: composite
  steps:
  
  - name: Get User Group
    id: get_user_groups
    shell: bash
    env:
      GH_TOKEN: ${{ inputs.github-token }}
    run: |
      ROLE=$(gh api "/orgs/${{ github.repository_owner }}/memberships/${{ github.event.sender.login }}" --jq '.role' 2>/dev/null) || ROLE="unknown"
      echo "role=$ROLE" >> $GITHUB_OUTPUT

  - name: Get User Teams Membership
    id: actorTeams
    shell: bash
    env:
      GH_TOKEN: ${{ inputs.github-token }}
    run: |
      IS_MEMBER="false"
      MATCHED=""
      IFS=',' read -ra TEAMS <<< "${{ inputs.team }}"
      for TEAM in "${TEAMS[@]}"; do
        TEAM=$(echo "$TEAM" | xargs)
        STATE=$(gh api "/orgs/${{ github.repository_owner }}/teams/$TEAM/memberships/${{ github.actor }}" --jq '.state' 2>/dev/null) || STATE=""
        if [ "$STATE" = "active" ]; then
          IS_MEMBER="true"
          MATCHED="${MATCHED:+$MATCHED,}$TEAM"
        fi
      done
      echo "teams=$MATCHED" >> $GITHUB_OUTPUT
      echo "isTeamMember=$IS_MEMBER" >> $GITHUB_OUTPUT

  - name: Display User Group
    shell: bash
    env:
      GH_ROLE: ${{ steps.get_user_groups.outputs.role }}
      GH_TEAMS: ${{ steps.actorTeams.outputs.teams }}
      GHA_ENV: ${{ inputs.environment }}
      ISMEMBER: ${{ steps.actorTeams.outputs.isTeamMember }}
    run: |
      cat <<EOF
      ----------------------------------------
      User: $GITHUB_ACTOR
      Role: $GH_ROLE
      Teams: $GH_TEAMS
      Deployment Team: $ISMEMBER
      Environment: $GHA_ENV
      ----------------------------------------
      EOF

  - name: Check if user is a member of the deployment team
    shell: bash
    if: >
      steps.actorTeams.outputs.isTeamMember == 'false' &&
      inputs.environment == inputs.protected_environment
    run: |
      echo "User is not a member of the deployment team, and therefore cannot deploy to production."
      exit 1