name: GHA Experiments
on:
  workflow_dispatch: 
    inputs:
      name:
        description: 'Name of the person to greet'
        required: false
      environment:
        description: 'Environment to deploy to'
        required: false
        default: 'dev'
        type: environment
      list_of_things: 
        description: 'List of things'
        required: false
        default: |
          one
          bubbles
          candy float
          knife \n fork
jobs:
  info:
    runs-on: ubuntu-latest
    environment: 
      name: ${{ inputs.environment }}
    steps:

    - name: Print GitHub context
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: echo "$GITHUB_CONTEXT"
    
    - name: Print ENV
      env:
        GITHUB_CONTEXT: ${{ toJson(github) }}
      run: printenv

    - name: N vs Z
      env:
        NAME: ${{ inputs.name }}
      run: |
        
        if [ -z "$NAME" ]; then
          echo "-z is true"
        else
          echo "The name is $NAME"
        fi

        if [ -n "$NAME" ]; then
          echo "-n is true"
        else
          echo "The name is empty"
        fi
        
    - name: Print list of things
      env:
        LIST_OF_THINGS: ${{ inputs.list_of_things }}
      run: |
        
        # loop each item in the space delimited list
        for item in $LIST_OF_THINGS; do
          echo "item: $item"
        done

    - name: The Job
      run: |
        echo '${{ toJSON(env) }}'

  test-rules:
    name: Test Rules Action (Node24)
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v6

    - name: Run rules action
      uses: ./rules
      with:
        current_environment: dev
        protected_environment: prod
        team: engineering
        github-token: ${{ secrets.GITHUB_TOKEN }}

  test-release:
    name: Test Release Script (Node24)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

    - uses: actions/checkout@v6

    - name: Create test tag
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        TEST_TAG="v0.0.0-test-node24-$(date +%s)"
        git tag "$TEST_TAG"
        git push origin "$TEST_TAG"
        echo "TEST_TAG=$TEST_TAG" >> $GITHUB_ENV

    - name: Create test release
      id: release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.TEST_TAG }}
        name: ${{ env.TEST_TAG }}
        prerelease: true
        body: "Test release for Node24 upgrade verification."

    - name: Verify output
      shell: bash
      run: |
        echo "Release URL: ${{ steps.release.outputs.url }}"
        if [ -z "${{ steps.release.outputs.url }}" ]; then
          echo "ERROR: url output was not set"
          exit 1
        fi
        echo "URL output is set correctly."

    - name: Cleanup test release
      if: always()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        if [ -n "$TEST_TAG" ]; then
          gh release delete "$TEST_TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TEST_TAG" 2>/dev/null || true
          echo "Cleaned up test release and tag: $TEST_TAG"
        fi